name: grpc_demo_app
description: Flutter gRPC Demo — replaces stdio-flag + WebSocket communication with a single gRPC channel.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  grpc_client:
    path: ../packages/grpc_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
