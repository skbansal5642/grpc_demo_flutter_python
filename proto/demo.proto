syntax = "proto3";

package demo;

// Single service replaces both:
//   - stdio flags + ack pattern  → ExecuteCommand (unary RPC)
//   - WebSocket streaming        → StreamOutput (server-streaming RPC)
service DemoService {
  rpc Ping          (Empty)          returns (PingResponse);
  rpc ExecuteCommand(CommandRequest) returns (CommandResponse);
  rpc StreamOutput  (StreamRequest)  returns (stream OutputChunk);
}

message Empty {}

message PingResponse {
  string server_version = 1;
  string message        = 2;
}

// Replaces: sending a flag string over stdio
message CommandRequest {
  string command = 1;
  string payload = 2;
}

// Replaces: waiting for an acknowledgment line from stdout
message CommandResponse {
  bool   success = 1;
  string message = 2;
  string result  = 3;
}

// Replaces: WebSocket session setup
message StreamRequest {
  string session_id   = 1;
  int32  chunk_count  = 2;
}

// Replaces: WebSocket message frames
message OutputChunk {
  int32  index    = 1;
  string data     = 2;
  bool   is_final = 3;
}
